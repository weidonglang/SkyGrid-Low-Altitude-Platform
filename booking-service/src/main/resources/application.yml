server:
  port: 8103

spring:
  application:
    name: booking-service
  cloud:
    nacos:
      # Both the global and discovery-level address are set deliberately.
      # Some local IDE runs can fail to bind the discovery address early enough
      # and then Nacos prints serverAddr='null'. Keeping both keys avoids that.
      server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        service: ${spring.application.name}
        ip: ${NACOS_REGISTER_IP:127.0.0.1}
        register-enabled: ${NACOS_REGISTER_ENABLED:true}
        fail-fast: ${NACOS_FAIL_FAST:true}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/low_altitude_booking?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    # Local default has been changed according to your machine: root / 123123.
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123123}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${RABBITMQ_HOST:127.0.0.1}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:lowaltitude}
    password: ${RABBITMQ_PASSWORD:lowaltitude123}

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.lowaltitude: INFO

low-altitude:
  ai:
    ollama-url: ${OLLAMA_GENERATE_URL:http://127.0.0.1:11434/api/generate}
    default-model: ${OLLAMA_MODEL:qwen3:8b}
  outbox:
    publisher-enabled: ${OUTBOX_PUBLISHER_ENABLED:true}
    batch-size: ${OUTBOX_BATCH_SIZE:20}
    fixed-delay-ms: ${OUTBOX_FIXED_DELAY_MS:5000}
    initial-delay-ms: ${OUTBOX_INITIAL_DELAY_MS:5000}


resilience4j:
  ratelimiter:
    instances:
      hotGridPreCheck:
        limit-for-period: 2
        limit-refresh-period: 5s
        timeout-duration: 0ms
  circuitbreaker:
    instances:
      notifyProbe:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 4
        minimum-number-of-calls: 2
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 1
  retry:
    instances:
      remoteProbe:
        max-attempts: 3
        wait-duration: 100ms
