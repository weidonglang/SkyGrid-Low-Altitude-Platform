services:
  low-altitude-prometheus:
    image: prom/prometheus:v2.54.1
    container_name: low-altitude-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-lifecycle"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  low-altitude-grafana:
    image: grafana/grafana:11.2.0
    container_name: low-altitude-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: lowaltitude123
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - low-altitude-grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - low-altitude-prometheus

volumes:
  low-altitude-grafana-data:
